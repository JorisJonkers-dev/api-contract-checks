# Tag -> release flow (org standard).
#
# release-please maintains a release PR that accumulates conventional commits
# and, when merged, creates a vX.Y.Z git tag plus a GitHub Release. Consumers
# pin this action repository to those immutable release tags.
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Author the release PR with the personal-stack-agents App token (not the
      # default GITHUB_TOKEN) so CI runs on the PR without a manual approval
      # gate. Best-effort: falls back to GITHUB_TOKEN when the App secrets or
      # installation are absent.
      - uses: actions/create-github-app-token@v2
        id: app-token
        continue-on-error: true
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    # This repository is a composite GitHub Action consumed by version tag/ref,
    # not a package registry artifact.
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Publish released action tag
        run: echo "Published API Contract Checks action tag ${RELEASE_TAG}"
        env:
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
