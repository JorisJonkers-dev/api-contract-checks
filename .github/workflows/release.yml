# Tag -> release flow (org standard).
#
# release-please maintains a release PR that accumulates conventional commits
# and, when merged, creates a vX.Y.Z git tag plus a GitHub Release. Consumers
# pin this action repository to those immutable release tags.
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    # This repository is a composite GitHub Action consumed by version tag/ref,
    # not a package registry artifact.
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Publish released action tag
        run: echo "Published API Contract Checks action tag ${RELEASE_TAG}"
        env:
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
